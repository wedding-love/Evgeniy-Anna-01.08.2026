<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Приглашение на свадьбу</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Forum&family=Marck+Script&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #1a1a1a;   
            --gold: #b2945e;     
            --sand-brown: #8c7356; 
            --bg-light: #f2f1df; 
            --font-main: 'Forum', serif;
            --font-hand: 'Marck Script', cursive;
            --burgundy: #800020; /* Бордовый цвет */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            background-color: #000;
            font-family: var(--font-main);
            scroll-behavior: smooth;
            overflow-x: hidden; 
            color: var(--accent);
        }

        .wrapper {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .image-block {
            width: 100%;
            line-height: 0;
            position: relative;
        }

        .image-block img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* МУЗЫКА - ОБНОВЛЕННЫЕ СТИЛИ */
        .music-strip {
            background-color: var(--bg-light);
            padding: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .music-control {
            display: flex;
            flex-direction: column; /* Значок теперь сверху */
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-align: center;
        }

        .music-icon { 
            width: 24px; 
            height: 24px; 
            fill: var(--sand-brown); 
        }
        
        .music-text { 
            font-family: var(--font-hand); 
            font-size: 18px; 
            color: var(--sand-brown);
            line-height: 1.2;
        }

        /* АНКЕТА */
        .form-overlay {
            position: absolute;
            top: 45%; 
            left: 50%;
            transform: translate(-50%, -45%);
            width: 85%;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .quest-block {
            margin-bottom: 30px; 
        }

        .quest-label {
            font-family: var(--font-hand);
            font-size: 24px;
            color: var(--accent);
            display: block;
            margin-bottom: 8px;
        }

        .quest-input {
            width: 90%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--gold); 
            padding: 5px;
            font-family: var(--font-hand);
            font-size: 22px;
            text-align: center;
            outline: none;
            color: var(--sand-brown);
        }

        .radio-group {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 40px; 
        }

        .radio-item {
            font-family: var(--font-hand);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .radio-item input {
            accent-color: var(--sand-brown);
            width: 20px;
            height: 20px;
        }

        .send-btn {
            background-color: var(--gold);
            color: white;
            border: none;
            padding: 14px 35px;
            font-family: var(--font-main);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 5px; 
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ТАЙМЕР */
        .timer-overlay {
            position: absolute;
            top: 32%; 
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            text-align: center;
        }

        .timer-display {
            display: flex;
            justify-content: center;
            gap: 2px;
        }

        .timer-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--burgundy);
            min-width: 52px;
        }

        .timer-val {
            font-family: var(--font-main);
            font-size: clamp(22px, 6.5vw, 28px);
            font-weight: bold;
            line-height: 1;
            color: var(--burgundy);
            text-shadow: 1px 1px 2px rgba(128, 0, 32, 0.3);
        }

        .timer-label {
            font-family: var(--font-main);
            font-size: 7.5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 5px; 
            color: var(--burgundy);
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .playing .music-icon { animation: pulse 2s infinite ease-in-out; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="image-block"><img src="IMG_6611.jpeg" alt=""></div>

    <div class="music-strip">
        <div class="music-control" id="musicBtn" onclick="toggleMusic()">
            <svg class="music-icon" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            <span class="music-text" id="statusText">Для полного погружения включите музыку</span>
        </div>
    </div>

    <div class="image-block"><img src="2.jpg" alt=""></div>
    <div class="image-block"><img src="7.jpg" alt=""></div>
    <div class="image-block"><img src="8.jpg" alt=""></div>
    <div class="image-block"><img src="3.jpg" alt=""></div>
    <div class="image-block"><img src="4.jpg" alt=""></div>
    
    <div class="image-block">
        <img src="10.jpg" alt="">
        <div class="form-overlay">
            <!-- ФОРМА -->
            <form id="inviteForm" action="https://formspree.io/f/xzdopljp" method="POST">
                <div class="quest-block">
                    <label class="quest-label" for="guestName">Ваше имя и Фамилия</label>
                    <input type="text" class="quest-input" id="guestName" name="name" required>
                </div>

                <div class="quest-block">
                    <label class="quest-label">Будете ли Вы?</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="attend" value="Да" required> Да</label>
                        <label class="radio-item"><input type="radio" name="attend" value="Нет"> Нет</label>
                    </div>
                </div>

                <button type="submit" class="send-btn" id="submitBtn">Отправить весточку</button>
            </form>
        </div>
    </div>

    <div class="image-block"><img src="6.jpg" alt=""></div>

    <div class="image-block">
        <img src="9.jpg" alt="">
        <div class="timer-overlay">
            <div class="timer-display">
                <div class="timer-unit">
                    <span class="timer-val" id="days">00</span>
                    <span class="timer-label" id="days-text">дней</span>
                </div>
                <div class="timer-unit">
                    <span class="timer-val" id="hours">00</span>
                    <span class="timer-label" id="hours-text">часов</span>
                </div>
                <div class="timer-unit">
                    <span class="timer-val" id="mins">00</span>
                    <span class="timer-label" id="mins-text">минут</span>
                </div>
                <div class="timer-unit">
                    <span class="timer-val" id="secs">00</span>
                    <span class="timer-label" id="secs-text">секунд</span>
                </div>
            </div>
        </div>
    </div>
</div>

<audio id="bgMusic" src="песня.mp3" loop></audio>

<script>
    // --- МУЗЫКА ---
    const music = document.getElementById('bgMusic');
    const btn = document.getElementById('musicBtn');
    let isPlaying = false;

    function toggleMusic() {
        if (isPlaying) {
            music.pause();
            btn.classList.remove('playing');
            document.getElementById('statusText').textContent = 'Для полного погружения включите музыку';
        } else {
            music.play().catch(e => {});
            btn.classList.add('playing');
            document.getElementById('statusText').textContent = 'Музыка играет';
        }
        isPlaying = !isPlaying;
    }

    // --- ОТПРАВКА ФОРМЫ ЧЕРЕЗ FORMSPREE (AJAX) ---
    const form = document.getElementById('inviteForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (event) => {
        event.preventDefault(); // Отменяем стандартную отправку с перезагрузкой

        // Меняем текст кнопки, чтобы показать процесс
        submitBtn.disabled = true;
        submitBtn.textContent = 'Отправляем...';

        try {
            const response = await fetch(form.action, {
                method: form.method,
                body: new FormData(form),
                headers: {
                    'Accept': 'application/json'
                }
            });

            if (response.ok) {
                // Успех! Показываем alert
                alert('Благодарим! Ваш ответ принят. Ждём вас!');
                // Опционально можно очистить форму после успешной отправки
                form.reset(); 
            } else {
                // Ошибка сервера
                throw new Error('Ошибка сети или сервера');
            }
        } catch (error) {
            // Сетевая ошибка или проблемы с JSON
            alert('Упс! Что-то пошло не так. Попробуйте ещё раз.');
            console.error('Ошибка:', error);
        } finally {
            // Возвращаем кнопку в исходное состояние
            submitBtn.disabled = false;
            submitBtn.textContent = 'Отправить весточку';
        }
    });

    // --- ТАЙМЕР ---
    function declension(number, titles) {
        const cases = [2, 0, 1, 1, 1, 2];
        return titles[(number % 100 > 4 && number % 100 < 20) ? 2 : cases[(number % 10 < 5) ? number % 10 : 5]];
    }

    function updateTimer() {
        const targetDate = new Date("August 1, 2026 00:00:00").getTime();
        const now = new Date().getTime();
        const gap = targetDate - now;

        if (gap > 0) {
            const second = 1000;
            const minute = second * 60;
            const hour = minute * 60;
            const day = hour * 24;

            const d = Math.floor(gap / day);
            const h = Math.floor((gap % day) / hour);
            const m = Math.floor((gap % hour) / minute);
            const s = Math.floor((gap % minute) / second);

            document.getElementById('days').innerText = d;
            document.getElementById('hours').innerText = h;
            document.getElementById('mins').innerText = m;
            document.getElementById('secs').innerText = s;

            document.getElementById('days-text').innerText = declension(d, ['день', 'дня', 'дней']);
            document.getElementById('hours-text').innerText = declension(h, ['час', 'часа', 'часов']);
            document.getElementById('mins-text').innerText = declension(m, ['минута', 'минуты', 'минут']);
            document.getElementById('secs-text').innerText = declension(s, ['секунда', 'секунды', 'секунд']);
        }
    }
    setInterval(updateTimer, 1000);
    updateTimer();
</script>

</body>
</html>
