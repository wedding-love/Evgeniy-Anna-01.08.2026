<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Приглашение на свадьбу</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Forum&family=Marck+Script&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #1a1a1a;   
            --gold: #b2945e;     
            --sand-brown: #8c7356; 
            --bg-light: #f2f1df; 
            --font-main: 'Forum', serif;
            --font-hand: 'Marck Script', cursive;
            --burgundy: #800020;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            background-color: #000;
            font-family: var(--font-main);
            scroll-behavior: smooth;
            overflow-x: hidden; 
            color: var(--accent);
        }

        .wrapper {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .image-block {
            width: 100%;
            line-height: 0;
            position: relative;
        }

        .image-block img {
            width: 100%;
            height: auto;
            display: block;
        }

        .music-strip {
            background-color: var(--bg-light);
            padding: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .music-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
            padding: 10px 20px;
        }

        .music-tap-hint {
            font-family: var(--font-hand);
            font-size: 20px;
            color: var(--sand-brown);
            line-height: 1;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        /* КРУГЛАЯ КНОПКА С КВАДРАТОМ */
        .music-icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: var(--sand-brown);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            pointer-events: none;
        }

        .playing .music-icon-wrapper {
            background-color: var(--burgundy);
            box-shadow: 0 2px 12px rgba(128, 0, 32, 0.4);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse { 
            0% { transform: scale(1); box-shadow: 0 2px 8px rgba(128, 0, 32, 0.4); } 
            50% { transform: scale(1.08); box-shadow: 0 4px 16px rgba(128, 0, 32, 0.6); } 
            100% { transform: scale(1); box-shadow: 0 2px 8px rgba(128, 0, 32, 0.4); } 
        }

        /* Квадрат внутри круга */
        .music-square {
            width: 14px;
            height: 14px;
            background-color: var(--bg-light);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* Когда музыка играет, квадрат превращается в паузу (две полоски) */
        .playing .music-square {
            width: 4px;
            height: 14px;
            border-radius: 2px;
            background-color: var(--bg-light);
            position: relative;
        }

        .playing .music-square::after {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            width: 4px;
            height: 14px;
            background-color: var(--bg-light);
            border-radius: 2px;
        }
        
        .music-text { 
            font-family: var(--font-hand); 
            font-size: 18px; 
            color: var(--sand-brown);
            line-height: 1.2;
            pointer-events: none;
        }

        .form-overlay {
            position: absolute;
            top: 45%; 
            left: 50%;
            transform: translate(-50%, -45%);
            width: 85%;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .quest-block {
            margin-bottom: 30px; 
        }

        .quest-label {
            font-family: var(--font-hand);
            font-size: 24px;
            color: var(--accent);
            display: block;
            margin-bottom: 8px;
        }

        .quest-input {
            width: 90%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--gold); 
            padding: 5px;
            font-family: var(--font-hand);
            font-size: 22px;
            text-align: center;
            outline: none;
            color: var(--sand-brown);
        }

        .radio-group {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 40px; 
        }

        .radio-item {
            font-family: var(--font-hand);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .radio-item input {
            accent-color: var(--sand-brown);
            width: 20px;
            height: 20px;
        }

        .send-btn {
            background-color: var(--gold);
            color: white;
            border: none;
            padding: 14px 35px;
            font-family: var(--font-main);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 5px; 
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .timer-overlay {
            position: absolute;
            top: 32%; 
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            text-align: center;
        }

        .timer-display {
            display: flex;
            justify-content: center;
            gap: 2px;
        }

        .timer-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--burgundy);
            min-width: 52px;
        }

        .timer-val {
            font-family: var(--font-main);
            font-size: clamp(22px, 6.5vw, 28px);
            font-weight: bold;
            line-height: 1;
            color: var(--burgundy);
            text-shadow: 1px 1px 2px rgba(128, 0, 32, 0.3);
        }

        .timer-label {
            font-family: var(--font-main);
            font-size: 7.5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 5px; 
            color: var(--burgundy);
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="image-block"><img src="IMG_6611.jpeg" alt=""></div>

    <div class="music-strip">
        <div class="music-control" id="musicBtn">
            <span class="music-tap-hint" id="tapHint">тык</span>
            
            <!-- КРУГЛАЯ КНОПКА С КВАДРАТОМ ВНУТРИ -->
            <div class="music-icon-wrapper">
                <div class="music-square"></div>
            </div>
            
            <span class="music-text" id="statusText">Для полного погружения включите музыку</span>
        </div>
    </div>

    <div class="image-block"><img src="2.jpg" alt=""></div>
    <div class="image-block"><img src="7.jpg" alt=""></div>
    <div class="image-block"><img src="8.jpg" alt=""></div>
    <div class="image-block"><img src="3.jpg" alt=""></div>
    <div class="image-block"><img src="4.jpg" alt=""></div>
    
    <div class="image-block">
        <img src="10.jpg" alt="">
        <div class="form-overlay">
            <form id="inviteForm" action="https://formspree.io/f/xzdopljp" method="POST">
                <div class="quest-block">
                    <label class="quest-label" for="guestName">Ваше имя и Фамилия</label>
                    <input type="text" class="quest-input" id="guestName" name="name" required>
                </div>

                <div class="quest-block">
                    <label class="quest-label">Будете ли Вы?</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="attend" value="Да" required> Да</label>
                        <label class="radio-item"><input type="radio" name="attend" value="Нет"> Нет</label>
                    </div>
                </div>

                <button type="submit" class="send-btn" id="submitBtn">Отправить весточку</button>
            </form>
        </div>
    </div>

    <div class="image-block"><img src="6.jpg" alt=""></div>

    <div class="image-block">
        <img src="IMG_6619.jpeg" alt="">
        <div class="timer-overlay">
            <div class="timer-display">
                <div class="timer-unit">
                    <span class="timer-val" id="days">00</span>
                    <span class="timer-label" id="days-text">дней</span>
                </div>
                <div class="timer-unit">
                    <span class="timer-val" id="hours">00</span>
                    <span class="timer-label" id="hours-text">часов</span>
                </div>
                <div class="timer-unit">
                    <span class="timer-val" id="mins">00</span>
                    <span class="timer-label" id="mins-text">минут</span>
                </div>
                <div class="timer-unit">
                    <span class="timer-val" id="secs">00</span>
                    <span class="timer-label" id="secs-text">секунд</span>
                </div>
            </div>
        </div>
    </div>
</div>

<audio id="bgMusic" src="песня.mp3" loop preload="auto"></audio>

<script>
    // --- МУЗЫКА ---
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    const statusText = document.getElementById('statusText');
    const tapHint = document.getElementById('tapHint');
    let isPlaying = false;

    // Загружаем аудио
    music.load();

    musicBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        
        if (isPlaying) {
            music.pause();
            musicBtn.classList.remove('playing');
            statusText.textContent = 'Для полного погружения включите музыку';
            tapHint.style.display = 'block';
            isPlaying = false;
        } else {
            const playPromise = music.play();
            
            if (playPromise !== undefined) {
                playPromise.then(function() {
                    musicBtn.classList.add('playing');
                    statusText.textContent = 'Музыка играет';
                    tapHint.style.display = 'none';
                    isPlaying = true;
                }).catch(function(error) {
                    console.error('Ошибка воспроизведения:', error);
                    alert('Не удалось включить музыку. Проверьте, что файл "песня.mp3" находится в той же папке.');
                    isPlaying = false;
                });
            }
        }
    });

    // --- ОТПРАВКА ФОРМЫ ---
    const form = document.getElementById('inviteForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async function(event) {
        event.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Отправляем...';

        try {
            const response = await fetch(form.action, {
                method: form.method,
                body: new FormData(form),
                headers: {
                    'Accept': 'application/json'
                }
            });

            if (response.ok) {
                alert('Благодарим! Ваш ответ принят. Ждём вас!');
                form.reset();
            } else {
                throw new Error('Ошибка сервера');
            }
        } catch (error) {
            alert('Упс! Что-то пошло не так. Попробуйте ещё раз.');
            console.error('Ошибка:', error);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Отправить весточку';
        }
    });

    // --- ТАЙМЕР ---
    function declension(number, titles) {
        var cases = [2, 0, 1, 1, 1, 2];
        var n = Math.abs(number);
        return titles[(n % 100 > 4 && n % 100 < 20) ? 2 : cases[(n % 10 < 5) ? n % 10 : 5]];
    }

    function updateTimer() {
        // 1 августа 2026 года (месяц 7 = август, т.к. январь = 0)
        var targetDate = new Date(2026, 7, 1, 0, 0, 0);
        var now = new Date();
        var gap = targetDate - now;

        if (gap > 0) {
            var day = 1000 * 60 * 60 * 24;
            var hour = 1000 * 60 * 60;
            var minute = 1000 * 60;
            var second = 1000;

            var d = Math.floor(gap / day);
            var h = Math.floor((gap % day) / hour);
            var m = Math.floor((gap % hour) / minute);
            var s = Math.floor((gap % minute) / second);

            document.getElementById('days').innerText = String(d).padStart(2, '0');
            document.getElementById('hours').innerText = String(h).padStart(2, '0');
            document.getElementById('mins').innerText = String(m).padStart(2, '0');
            document.getElementById('secs').innerText = String(s).padStart(2, '0');

            document.getElementById('days-text').innerText = declension(d, ['день', 'дня', 'дней']);
            document.getElementById('hours-text').innerText = declension(h, ['час', 'часа', 'часов']);
            document.getElementById('mins-text').innerText = declension(m, ['минута', 'минуты', 'минут']);
            document.getElementById('secs-text').innerText = declension(s, ['секунда', 'секунды', 'секунд']);
        } else {
            document.getElementById('days').innerText = '00';
            document.getElementById('hours').innerText = '00';
            document.getElementById('mins').innerText = '00';
            document.getElementById('secs').innerText = '00';
            
            document.getElementById('days-text').innerText = 'дней';
            document.getElementById('hours-text').innerText = 'часов';
            document.getElementById('mins-text').innerText = 'минут';
            document.getElementById('secs-text').innerText = 'секунд';
        }
    }

    // Запускаем таймер сразу и обновляем каждую секунду
    updateTimer();
    setInterval(updateTimer, 1000);
</script>

</body>
</html>
