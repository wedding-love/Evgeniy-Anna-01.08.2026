<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Приглашение на свадьбу</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Forum&family=Marck+Script&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #1a1a1a;   
            --gold: #b2945e;     
            --sand-brown: #8c7356; 
            --bg-light: #f2f1df; 
            --font-main: 'Forum', serif;
            --font-hand: 'Marck Script', cursive;
            --burgundy: #800020; /* Бордовый цвет */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            background-color: #000;
            font-family: var(--font-main);
            scroll-behavior: smooth;
            overflow-x: hidden; 
            color: var(--accent);
        }

        .wrapper {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .image-block {
            width: 100%;
            line-height: 0;
            position: relative;
        }

        .image-block img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* МУЗЫКА - ОБНОВЛЕННЫЕ СТИЛИ */
        .music-strip {
            background-color: var(--bg-light);
            padding: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .music-control {
            display: flex;
            flex-direction: column; /* Всё в колонку: тык → значок → текст */
            align-items: center;
            gap: 6px;
            cursor: pointer;
            text-align: center;
        }

        /* НОВЫЙ СТИЛЬ ДЛЯ ТЕКСТА "тык" НАД ЗНАЧКОМ */
        .music-tap-hint {
            font-family: var(--font-hand);
            font-size: 20px;
            color: var(--sand-brown);
            line-height: 1;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .music-icon { 
            width: 24px; 
            height: 24px; 
            fill: var(--sand-brown); 
        }
        
        .music-text { 
            font-family: var(--font-hand); 
            font-size: 18px; 
            color: var(--sand-brown);
            line-height: 1.2;
        }

        /* АНКЕТА */
        .form-overlay {
            position: absolute;
            top: 45%; 
            left: 50%;
            transform: translate(-50%, -45%);
            width: 85%;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .quest-block {
            margin-bottom: 30px; 
        }

        .quest-label {
            font-family: var(--font-hand);
            font-size: 24px;
            color: var(--accent);
            display: block;
            margin-bottom: 8px;
        }

        .quest-input {
            width: 90%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--gold); 
            padding: 5px;
            font-family: var(--font-hand);
            font-size: 22px;
            text-align: center;
            outline: none;
            color: var(--sand-brown);
        }

        .radio-group {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 40px; 
        }

        .radio-item {
            font-family: var(--font-hand);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .radio-item input {
            accent-color: var(--sand-brown);
            width: 20px;
            height: 20px;
        }

        .send-btn {
            background-color: var(--gold);
            color: white;
            border: none;
            padding: 14px 35px;
            font-family: var(--font-main);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 5px; 
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ТАЙМЕР */
        .timer-overlay {
            position: absolute;
            top: 32%; 
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            text-align: center;
        }

        .timer-display {
            display: flex;
            justify-content: center;
            gap: 2px;
        }

        .timer-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--burgundy);
            min-width: 52px;
        }

        .timer-val {
            font-family: var(--font-main);
            font-size: clamp(22px, 6.5vw, 28px);
            font-weight: bold;
            line-height: 1;
            color: var(--burgundy);
            text-shadow: 1px 1px 2px rgba(128, 0, 32, 0.3);
        }

        .timer-label {
            font-family: var(--font-main);
            font-size: 7.5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 5px; 
            color: var(--burgundy);
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .playing .music-icon { animation: pulse 2s infinite ease-in-out; }
    </style>
</head>
